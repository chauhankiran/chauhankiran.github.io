<!doctype html>
<html lang="en" dir="ltr">

    <style>

      *,

      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #f8f8f8;
        color: #222;
        font-family: "PT Serif", Georgia, Times, "Times New Roman", serif;

        width: 100%;
        max-width: 1000px;
        margin: 5rem auto;
        padding-right: 55px;

      }
      h1,
      h2,

        font-weight: bold;
        text-rendering: optimizelegibility;
      }
      h1 {
        font-size: 2.2em;
        line-height: 1.2em;
      }
      h3 {
        margin-bottom: .3rem;
      }
      a {
        color: #1863a1;
        text-decoration: none;
      }
      header h1 {
        margin-bottom: 0;
      }
      header p {
        margin-top: 0;
        color: #aaa;
      }
      .post {
        margin-top: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid #ddd;
      }
      .post-header h2 {
        margin-bottom: 0;
      }
      time {
        color: #aaa;
        font-size: 1.1rem;
      }
      .post-content {
        margin-top: 1.4rem;
      }
      footer {
        padding-top: 1rem;
        padding-bottom: 1rem;
        color: #aaa;
      }
      footer a {
        color: #888 !important;
      }
