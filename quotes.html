<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, viewport-fit=cover, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Quotes</title>

    <style>
      @import url('https://rsms.me/inter/inter.css');

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #fff;
        color: #2E2E2E;
        font-family: 'Inter', sans-serif;
        font-feature-settings: "ss03","zero","cv08","cv11" 1;
        font-size: 1.2rem;
        font-style: normal;
        font-weight: normal;
        line-height: 1.5;
        width: 100%;
        max-width: 45rem;
        margin: 8rem auto;
        padding: 1rem;
        transition: background-color 0.5s ease-out;
      }
      h1, h2, h3 { margin: 0; }
      h1 { margin: 0;
        font-weight: 900;
        font-size: 4rem;
        letter-spacing: 0;
        background: linear-gradient(to left, #ff5c87 30%, #4762ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent; }
      h2 { margin-top: 2rem; }
      p { margin-top: 0; }
      a {
        color: #0052cc;
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      hr {
        border: 0;
        height: 1px;
        background-image: linear-gradient(to right, rgba(33, 33, 33, 0), rgba(33, 33, 33, 0.50), rgba(33, 33, 33, 0));
      }
      pre, code { font-family: "Source Code Pro", monospace; }
      code { color: rgb(124, 58, 237); }
      .note { color: #929292; }
      blockquote { font-style: italic; margin-bottom: 2rem; }
      blockquote p { margin-bottom: 0; }
      cite::before { content: " — "; }
    </style>
  </head>
  <body>
    <header>
      <h1>Quotes</h1>
    </header>
    <main>
      <blockquote>
        <p>
          Bliss it was in that dawn to be alive <br>
But to be young was very heaven.
        </p>
        <cite>William Wordsworth, The Prelude</cite>
      </blockquote>

      <blockquote>
        <p>
          A ship in harbor is safe, but that is not what ships are built for.
        </p>
        <cite>John A. Shedd</cite>
      </blockquote>

      <blockquote>
        <p>
          When the enemy is making a false movement we must take good care not to interrupt him.
        </p>
        <cite>Napoleon</cite>
      </blockquote>
    </main>
  </body>
</html>
