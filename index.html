<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Kiran Chauhan">

    <link rel="shortcut icon" href="favicon.ico">
    <style>
      @import url("https://use.typekit.net/zli1tzj.css?v=2");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #fff;
        color: #444;
        font-family: "source-serif-pro", serif;
        font-size: 1rem;
        font-style: normal;
        font-weight: normal;
        line-height: 1.5;
        width: 100%;
        max-width: 39rem;
        margin: 8rem auto;
        padding: 1rem;
        transition: background-color 0.5s ease-out;
      }
      h1, p { margin: 0 }
      p { font-style: italic; }
      a {
        color: #0052cc;
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>Hi! I'm Kiran.</h1>
    <p>Team Lead at <a href="https://www.varianceinfotech.com/" target="_blank">Variance Infotech Pvt. Ltd.</a></p>
  </body>
