<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Kiran Chauhan">

    <title>Kiran Chauhan</title>
    <link rel="shortcut icon" href="favicon.ico">
    <style>
      @import url("https://use.typekit.net/zli1tzj.css?v=2");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #fff;
        color: #2E2E2E;
        font-family: "source-serif-pro", serif;
        font-size: 1rem;
        font-style: normal;
        font-weight: normal;
        line-height: 1.5;
        width: 100%;
        max-width: 39rem;
        margin: 8rem auto;
        padding: 1rem;
        transition: background-color 0.5s ease-out;
      }
      h1 { margin: 0; }
      p { margin-top: 0; }
      a {
        color: #0052cc;
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      hr {
        border: 0;
        height: 1px;
        background-image: linear-gradient(to right, rgba(33, 33, 33, 0), rgba(33, 33, 33, 0.50), rgba(33, 33, 33, 0));
      }
      code { font-family: "courier-prime",monospace; }
    </style>
  </head>
  <body>
    <header>
      <h1>Hi! I'm Kiran.</h1>
      <p>I design software with and for people.</p>
    </header>

    <hr>
  </body>
</html>
