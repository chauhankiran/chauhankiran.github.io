<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <title>KC</title>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap');

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        padding: 0;
        margin: 0;
      }
      body {
        color: #222;
        font-family: 'PT Serif', serif;
        font-size: 1.3rem;
        margin: 5rem auto;
        width: 100%;
        max-width: 42rem;
        padding: 1.5rem;
      }
      h1 {
        font-size: 3rem;
        margin-block: .2rem;
      }
      #peep {
        position: fixed;
        right: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <h1>Kiran Chauhan</h1>
    <p>
      I design software with and for people. I occasionally read and write. I know Gujarati, Node, React, and Python. 
    </p>

    <img src="peep-91.svg" alt="Peep with mustache" id="peep">
  </body>
</html>
