<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">

    <meta name="author" content="Kiran Chauhan">
    <title>KC</title>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap');

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        padding: 0;
        margin: 0;
      }
      body {
        color: #222;
        font-family: "PT Serif", "Georgia", "Helvetica Neue", Arial, sans-serif;
        font-size: 1.3rem;
        line-height: 1.42;
        margin: 5rem auto;
        width: 100%;
        max-width: 42rem;
        padding: 1.5rem;
      }
      h1 {
        font-weight: 700;
        font-size: 3rem;
        margin-block: .2rem;
        text-rendering: optimizelegibility;
      }
      #peep {
        position: fixed;
        right: 0;
        bottom: -3.5rem;
        transform: scaleX(-1);
      }
      #peep:hover {
        transform: scaleX(1);
      }
      @media only screen and (max-width: 768px) {
        #peep {
          display: none;
        }
      }
      .first-name {
        font-weight: 400;
      }
      a {
        color: #387ed1;
        text-decoration: none;
      }
      ul {
        list-style-type: none;
        padding-left: 0;
        margin-top: 4rem;
      }
      li {
        margin-bottom: .6rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="first-name">Kiran</span> Chauhan</h1>
    </header>

    <main>
      <p>
        I design software with and for people. I occasionally read and write. I know Gujarati, Node, React, and Python. 
      </p>

      <ul>
        <li>
          <time>2022-06</time>
          <a href="os1.html">Operating System Pt. 1</a>
        </li>
        <li>
          <time>2022-06</time>
          <a href="scala1.html">Scala Tutorial Pt. 1</a>
        </li>
      </ul>
    </main>

    <img src="peep-91.svg" alt="Peep with mustache" id="peep" onClick="party()">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
      function party() {
        var count = 200;
        var defaults = {
          origin: { y: 0.7 }
        };

        function fire(particleRatio, opts) {
          confetti(Object.assign({}, defaults, opts, {
            particleCount: Math.floor(count * particleRatio)
          }));
        }

        fire(0.25, {
          spread: 26,
          startVelocity: 55,
        });

        fire(0.2, {
          spread: 60,
        });

        fire(0.35, {
          spread: 100,
          decay: 0.91,
          scalar: 0.8
        });

        fire(0.1, {
          spread: 120,
          startVelocity: 25,
          decay: 0.92,
          scalar: 1.2
        });

        fire(0.1, {
          spread: 120,
          startVelocity: 45,
        });
      }
    </script> 
  </body>
</html>
